<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>CasualStreamer overlay</title>
<style>
  body { margin: 0; background: transparent; font-family: 'Segoe UI', sans-serif; color: #ffffff; }
  .toast {
    position: fixed;
    top: 32px;
    right: 32px;
    padding: 18px 22px;
    background: rgba(20, 22, 24, 0.85);
    border-left: 4px solid #d4a017;
    border-radius: 6px;
    box-shadow: 0 6px 20px rgba(0,0,0,.5);
    min-width: 320px;
    max-width: 520px;
    opacity: 0;
    transform: translateX(60px);
    transition: opacity .35s ease, transform .35s ease;
  }
  .toast.on { opacity: 1; transform: translateX(0); }
  .toast .who { font-size: 20px; font-weight: 600; color: #d4a017; margin-bottom: 4px; }
  .toast .amt { font-size: 14px; color: #eee; margin-bottom: 8px; }
  .toast .event { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .toast .msg { font-size: 14px; color: #bbb; font-style: italic; }
</style>
</head>
<body>
  <div id="toast" class="toast">
    <div class="who" id="who"></div>
    <div class="amt" id="amt"></div>
    <div class="event" id="ev"></div>
    <div class="msg" id="msg"></div>
  </div>
<script>
(function () {
  const toast = document.getElementById('toast');
  const who = document.getElementById('who');
  const amt = document.getElementById('amt');
  const ev = document.getElementById('ev');
  const msg = document.getElementById('msg');
  const queue = [];
  let showing = false;

  function next() {
    if (showing) { return; }
    const d = queue.shift();
    if (!d) { return; }
    showing = true;
    who.textContent = d.donor || 'Anonymous';
    amt.textContent = d.amount + ' ' + (d.currency || 'RUB');
    ev.textContent = d.eventLabel || '';
    msg.textContent = d.message || '';
    toast.classList.add('on');
    setTimeout(() => {
      toast.classList.remove('on');
      setTimeout(() => { showing = false; next(); }, 500);
    }, (d.durationSec || 6) * 1000);
  }

  function connect() {
    const src = new EventSource('/overlay/events');
    src.addEventListener('donation', e => {
      try { queue.push(JSON.parse(e.data)); next(); } catch (err) {}
    });
    src.onerror = () => { src.close(); setTimeout(connect, 2000); };
  }
  connect();
})();
</script>
</body>
</html>
